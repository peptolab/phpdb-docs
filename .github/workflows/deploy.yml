name: Build and deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Opt JavaScript-based actions onto Node 24 ahead of GitHub's June 2026
# default flip — silences the Node 20 deprecation notices currently emitted
# by actions/checkout@v4, actions/setup-node@v4, actions/configure-pages@v5,
# and actions/upload-pages-artifact@v3. Drop this env once those actions
# ship versions that bundle Node 24 natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          SITE_URL: ${{ steps.pages.outputs.origin || 'https://peptolab.github.io' }}
          SITE_BASE: /phpdb-docs/
      - uses: actions/configure-pages@v5
        id: pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
